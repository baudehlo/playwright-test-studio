name: Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          # - platform: macos-13
          #   args: --target x86_64-apple-darwin
          #   rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: cd runner && npm ci && npm run build
      - name: Validate release token
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$GITHUB_TOKEN" ]]; then
            echo "GITHUB_TOKEN is empty in this workflow context"
            exit 1
          fi
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Apple code signing — set these secrets in your repo to produce a
          # signed + notarized macOS .app that passes Gatekeeper.
          #
          # How to obtain them:
          #   APPLE_CERTIFICATE          – base64 of your "Developer ID Application" .p12
          #                               export (openssl base64 -in cert.p12 | pbcopy)
          #   APPLE_CERTIFICATE_PASSWORD – the password you set when exporting the .p12
          #   APPLE_SIGNING_IDENTITY     – e.g. "Developer ID Application: Your Name (TEAMID)"
          #   APPLE_ID                   – your Apple ID email
          #   APPLE_PASSWORD             – an app-specific password from appleid.apple.com
          #   APPLE_TEAM_ID              – your 10-char Team ID from developer.apple.com
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'v${{ inputs.version }}'
          generateReleaseNotes: true
          args: ${{ matrix.args }}
