name: Build
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true

permissions:
  contents: write

jobs:
  release_notes:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.compose.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compose release notes
        id: compose
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          current_tag="v${VERSION}"
          previous_tag="$(git tag --sort=-version:refname | grep -vx "$current_tag" | head -n 1 || true)"

          if [[ -n "$previous_tag" ]]; then
            commit_range="${previous_tag}..HEAD"
            compare_text="Changes since ${previous_tag}"
          else
            commit_range="HEAD"
            compare_text="Initial release notes"
          fi

          commit_log="$(git log --no-merges --pretty=format:'- %s (%h)' ${commit_range} | head -n 40 || true)"
          if [[ -z "$commit_log" ]]; then
            commit_log='- No commit summaries were available for this build.'
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Playwright Test Studio ${current_tag}"
            echo
            echo "${compare_text}"
            echo
            echo "### Highlights"
            echo "- Desktop app build generated via GitHub Actions"
            echo "- Tauri bundles attached for the configured target platforms"
            echo
            echo "### Commit Summary"
            echo "$commit_log"
          } > "$notes_file"

          {
            echo 'body<<EOF'
            cat "$notes_file"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: release_notes
    strategy:
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          # - platform: macos-13
          #   args: --target x86_64-apple-darwin
          #   rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: cd runner && npm ci && npm run build
      - name: Download bundled Node.js (macOS arm64)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION=22.13.1
          mkdir -p src-tauri/binaries src-tauri/node-dist
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" | tar -xz
          cp "node-v${NODE_VERSION}-darwin-arm64/bin/node" "src-tauri/binaries/node-aarch64-apple-darwin"
          cp -R "node-v${NODE_VERSION}-darwin-arm64/lib/node_modules/npm" "src-tauri/node-dist/npm"
          chmod +x "src-tauri/binaries/node-aarch64-apple-darwin"
          rm -rf "node-v${NODE_VERSION}-darwin-arm64"
      - name: Prepare bundled Node signature (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          NODE_BIN="src-tauri/binaries/node-aarch64-apple-darwin"
          xattr -cr "$NODE_BIN" || true
          codesign --remove-signature "$NODE_BIN" || true
          codesign --force --sign - --timestamp=none "$NODE_BIN"
          codesign --verify --verbose "$NODE_BIN"
      - name: Download bundled Node.js (Linux x64)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION=22.13.1
          mkdir -p src-tauri/binaries src-tauri/node-dist
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" | tar -xz
          cp "node-v${NODE_VERSION}-linux-x64/bin/node" "src-tauri/binaries/node-x86_64-unknown-linux-gnu"
          cp -R "node-v${NODE_VERSION}-linux-x64/lib/node_modules/npm" "src-tauri/node-dist/npm"
          chmod +x "src-tauri/binaries/node-x86_64-unknown-linux-gnu"
          rm -rf "node-v${NODE_VERSION}-linux-x64"
      - name: Download bundled Node.js (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "22.13.1"
          New-Item -ItemType Directory -Force src-tauri/binaries, src-tauri/node-dist | Out-Null
          Invoke-WebRequest "https://nodejs.org/dist/v$version/node-v$version-win-x64.zip" -OutFile node.zip
          Expand-Archive node.zip .
          Copy-Item "node-v$version-win-x64/node.exe" "src-tauri/binaries/node-x86_64-pc-windows-msvc.exe"
          Copy-Item -Recurse "node-v$version-win-x64/node_modules/npm" "src-tauri/node-dist/npm"
          Remove-Item -Recurse -Force "node-v$version-win-x64", node.zip
      - name: Validate release token
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$GITHUB_TOKEN" ]]; then
            echo "GITHUB_TOKEN is empty in this workflow context"
            exit 1
          fi
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Apple code signing — set these secrets in your repo to produce a
          # signed + notarized macOS .app that passes Gatekeeper.
          #
          # How to obtain them:
          #   APPLE_CERTIFICATE          – base64 of your "Developer ID Application" .p12
          #                               export (openssl base64 -in cert.p12 | pbcopy)
          #   APPLE_CERTIFICATE_PASSWORD – the password you set when exporting the .p12
          #   APPLE_SIGNING_IDENTITY     – e.g. "Developer ID Application: Your Name (TEAMID)"
          #   APPLE_ID                   – your Apple ID email
          #   APPLE_PASSWORD             – an app-specific password from appleid.apple.com
          #   APPLE_TEAM_ID              – your 10-char Team ID from developer.apple.com
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'v${{ inputs.version }}'
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  finalize_release_notes:
    needs: [release_notes, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.release_notes.outputs.body }}
          RELEASE_TAG: v${{ inputs.version }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
