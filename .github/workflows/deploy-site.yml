name: Deploy Site
on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        run: cd site && npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Provision S3 bucket
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "Creating bucket $S3_BUCKET"
            REGION="${AWS_REGION}"
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$S3_BUCKET"
            else
              aws s3api create-bucket --bucket "$S3_BUCKET" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
          else
            echo "Bucket $S3_BUCKET already exists"
          fi
          # Idempotent: keep public access blocked (OAC handles access)
          aws s3api put-public-access-block --bucket "$S3_BUCKET" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      - name: Request or find ACM certificate
        # ACM certificates for CloudFront must be in us-east-1
        env:
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          set -euo pipefail
          CERT_ARN=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='${SITE_DOMAIN}' && Status!='EXPIRED'].CertificateArn | [0]" \
            --output text)
          if [ "$CERT_ARN" = "None" ] || [ -z "$CERT_ARN" ]; then
            echo "Requesting new ACM certificate for ${SITE_DOMAIN}"
            CERT_ARN=$(aws acm request-certificate --region us-east-1 \
              --domain-name "$SITE_DOMAIN" \
              --subject-alternative-names "www.${SITE_DOMAIN}" \
              --validation-method DNS \
              --query CertificateArn --output text)
            echo "Certificate requested: $CERT_ARN"
          else
            echo "Found existing certificate: $CERT_ARN"
          fi
          echo "CERT_ARN=$CERT_ARN" >> "$GITHUB_ENV"

      - name: Add ACM DNS validation records and wait for issuance
        env:
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          set -euo pipefail
          CERT_STATUS=$(aws acm describe-certificate --region us-east-1 \
            --certificate-arn "$CERT_ARN" \
            --query "Certificate.Status" --output text)
          if [ "$CERT_STATUS" = "ISSUED" ]; then
            echo "Certificate already issued; skipping DNS validation."
          else
            HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
              --dns-name "${SITE_DOMAIN}." \
              --query "HostedZones[?Name=='${SITE_DOMAIN}.'].Id" \
              --output text | sed 's|/hostedzone/||')

            echo "Waiting for ACM to provide validation records..."
            for i in $(seq 1 18); do
              RECORDS=$(aws acm describe-certificate --region us-east-1 \
                --certificate-arn "$CERT_ARN" \
                --query "Certificate.DomainValidationOptions[?ResourceRecord!=null].ResourceRecord" \
                --output json)
              if [ "$(echo "$RECORDS" | jq 'length')" -gt "0" ]; then
                break
              fi
              echo "  attempt $i/18 – waiting 10s..."
              sleep 10
            done

            # sort -u deduplicates records (apex + www may share the same CNAME)
            echo "$RECORDS" | jq -c '.[]' | sort -u | while read -r record; do
              NAME=$(echo "$record" | jq -r '.Name')
              VALUE=$(echo "$record" | jq -r '.Value')
              TYPE=$(echo "$record" | jq -r '.Type')
              aws route53 change-resource-record-sets \
                --hosted-zone-id "$HOSTED_ZONE_ID" \
                --change-batch "$(jq -n \
                  --arg name "$NAME" --arg type "$TYPE" --arg value "$VALUE" \
                  '{Changes:[{Action:"UPSERT",ResourceRecordSet:{Name:$name,Type:$type,TTL:300,ResourceRecords:[{Value:$value}]}}]}')"
            done

            echo "Waiting for certificate to be issued (up to 15 min)..."
            aws acm wait certificate-validated --region us-east-1 --certificate-arn "$CERT_ARN"
            echo "Certificate issued."
          fi

      - name: Provision CloudFront distribution
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          set -euo pipefail
          REGION="${AWS_REGION}"
          S3_ORIGIN_DOMAIN="${S3_BUCKET}.s3.${REGION}.amazonaws.com"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          CF_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${S3_ORIGIN_DOMAIN}'].Id | [0]" \
            --output text)

          if [ "$CF_DIST_ID" = "None" ] || [ -z "$CF_DIST_ID" ]; then
            echo "Creating CloudFront Origin Access Control..."
            OAC_ID=$(aws cloudfront list-origin-access-controls \
              --query "OriginAccessControlList.Items[?Name=='${S3_BUCKET}-oac'].Id | [0]" \
              --output text)
            if [ "$OAC_ID" = "None" ] || [ -z "$OAC_ID" ]; then
              OAC_ID=$(aws cloudfront create-origin-access-control \
                --origin-access-control-config \
                  "Name=${S3_BUCKET}-oac,Description=OAC for ${S3_BUCKET},SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=s3" \
                --query "OriginAccessControl.Id" --output text)
            fi

            echo "Creating CloudFront distribution..."
            CF_DIST=$(aws cloudfront create-distribution --distribution-config "$(jq -n \
              --arg ref "${S3_BUCKET}-$(date +%s)" \
              --arg origin "$S3_ORIGIN_DOMAIN" \
              --arg oac "$OAC_ID" \
              --arg domain "$SITE_DOMAIN" \
              --arg cert "$CERT_ARN" \
              '{
                CallerReference: $ref,
                Aliases: {Quantity: 2, Items: [$domain, ("www." + $domain)]},
                DefaultRootObject: "index.html",
                Origins: {Quantity: 1, Items: [{
                  Id: "s3-origin",
                  DomainName: $origin,
                  OriginAccessControlId: $oac,
                  S3OriginConfig: {OriginAccessIdentity: ""}
                }]},
                DefaultCacheBehavior: {
                  TargetOriginId: "s3-origin",
                  ViewerProtocolPolicy: "redirect-to-https",
                  CachePolicyId: "658327ea-f89d-4fab-a63d-7e88639e58f6",
                  Compress: true,
                  AllowedMethods: {
                    Quantity: 2, Items: ["GET","HEAD"],
                    CachedMethods: {Quantity: 2, Items: ["GET","HEAD"]}
                  }
                },
                CustomErrorResponses: {Quantity: 1, Items: [{
                  ErrorCode: 404,
                  ResponseCode: "200",
                  ResponsePagePath: "/index.html",
                  ErrorCachingMinTTL: 0
                }]},
                Comment: ($domain + " static site"),
                Enabled: true,
                HttpVersion: "http2and3",
                ViewerCertificate: {
                  ACMCertificateArn: $cert,
                  SSLSupportMethod: "sni-only",
                  MinimumProtocolVersion: "TLSv1.2_2021"
                },
                PriceClass: "PriceClass_100"
              }')")
            CF_DIST_ID=$(echo "$CF_DIST" | jq -r '.Distribution.Id')
            CF_DOMAIN=$(echo "$CF_DIST" | jq -r '.Distribution.DomainName')
            echo "Created distribution: $CF_DIST_ID ($CF_DOMAIN)"
          else
            echo "Using existing distribution: $CF_DIST_ID"
            CF_DOMAIN=$(aws cloudfront get-distribution \
              --id "$CF_DIST_ID" \
              --query "Distribution.DomainName" --output text)
          fi

          # Always (re)apply bucket policy – idempotent, handles drift
          aws s3api put-bucket-policy --bucket "$S3_BUCKET" --policy "$(jq -n \
            --arg bucket "$S3_BUCKET" \
            --arg account "$ACCOUNT_ID" \
            --arg dist "$CF_DIST_ID" \
            '{
              Version: "2012-10-17",
              Statement: [{
                Effect: "Allow",
                Principal: {Service: "cloudfront.amazonaws.com"},
                Action: "s3:GetObject",
                Resource: ("arn:aws:s3:::" + $bucket + "/*"),
                Condition: {StringEquals: {
                  "AWS:SourceArn": ("arn:aws:cloudfront::" + $account + ":distribution/" + $dist)
                }}
              }]
            }')"

          echo "CF_DIST_ID=$CF_DIST_ID" >> "$GITHUB_ENV"
          echo "CF_DOMAIN=$CF_DOMAIN" >> "$GITHUB_ENV"

      - name: Sync files to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -euo pipefail
          # Hashed assets get long-lived cache; index.html must not be cached
          aws s3 sync site/dist/ "s3://${S3_BUCKET}/" --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp site/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "/*"

      - name: Upsert Route53 DNS records
        # Z2FDTNDATAQYW2 is the fixed hosted zone ID for all CloudFront distributions
        env:
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          set -euo pipefail
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${SITE_DOMAIN}." \
            --query "HostedZones[?Name=='${SITE_DOMAIN}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          aws route53 change-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --change-batch "$(jq -n \
              --arg domain "$SITE_DOMAIN" \
              --arg cf "$CF_DOMAIN" \
              '{Changes: [
                {Action: "UPSERT", ResourceRecordSet: {
                  Name: $domain, Type: "A",
                  AliasTarget: {HostedZoneId: "Z2FDTNDATAQYW2", DNSName: $cf, EvaluateTargetHealth: false}
                }},
                {Action: "UPSERT", ResourceRecordSet: {
                  Name: ("www." + $domain), Type: "A",
                  AliasTarget: {HostedZoneId: "Z2FDTNDATAQYW2", DNSName: $cf, EvaluateTargetHealth: false}
                }}
              ]}')"
          echo "Site will be live at https://${SITE_DOMAIN}"
